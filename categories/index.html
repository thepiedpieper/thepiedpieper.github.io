<!doctype html><html lang=en><head><meta charset=UTF-8><meta name=viewport content="width=device-width,initial-scale=1"><title>Categories | Adrika Chaudhuri</title><link rel=preconnect href=https://fonts.googleapis.com><link rel=preconnect href=https://fonts.gstatic.com crossorigin><link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Literata:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel=stylesheet><link rel=stylesheet href=/css/journal.css></head><body><header class=journal-bookmark><a href=/ title="Back to cover">← cover</a></header><main class="list-container notebook-categories" style="max-width:750px;margin:0 auto;padding:4rem 20px;position:relative"><img src=/images/dried1.png class=botanical-scrap style=top:50px;right:-300px;width:350px><h1 style=font-size:3rem;margin-bottom:1rem;color:var(--text-color);text-align:center>Categories</h1><div style=display:flex;flex-direction:column;gap:4rem;margin-top:4rem></div></main></body><button id=dark-mode-toggle aria-label="Toggle Dark Mode" style="position:fixed;top:120px;right:0;z-index:10000;background:#fcfaf8;padding:.5rem 1rem;border:1px solid rgba(0,0,0,.1);border-right:none;border-radius:8px 0 0 8px;box-shadow:-2px 2px 10px rgba(0,0,0,5%);cursor:pointer;font-family:caveat,cursive;transition:all .3s ease">
<span class=mode-icon style=font-size:1.4rem>🌙</span>
</button>
<script>const toggle=document.getElementById("dark-mode-toggle"),body=document.body,icon=document.querySelector(".mode-icon");localStorage.getItem("theme")==="dark"&&(body.classList.add("dark"),icon.textContent="☀️"),toggle.addEventListener("click",()=>{body.classList.toggle("dark");const e=body.classList.contains("dark");localStorage.setItem("theme",e?"dark":"light"),icon.textContent=e?"☀️":"🌙"})</script></html>
